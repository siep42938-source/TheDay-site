<!DOCTYPE html>
<html lang="ru" data-theme="space">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ-панель — TheDay</title>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .adm{padding:90px 0 60px;min-height:100vh;position:relative;z-index:1}
    .adm-login{max-width:400px;margin:0 auto;padding:24px}
    .adm-main{max-width:1100px;margin:0 auto;padding:0 24px}
    .adm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
    .adm-header h1{font-size:28px;font-weight:800;color:#fff}
    .adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
    .stat-card{background:rgba(13,13,20,0.7);border:1px solid rgba(135,206,235,0.1);border-radius:12px;padding:20px;text-align:center}
    .stat-num{font-size:32px;font-weight:900;color:#87CEEB}
    .stat-label{font-size:12px;color:#4a5568;margin-top:4px}
    .adm-search{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .adm-search input{flex:1;min-width:200px}
    .users-table{width:100%;border-collapse:collapse;font-size:13px}
    .users-table th{text-align:left;padding:10px 12px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#4fc3f7;text-transform:uppercase;border-bottom:1px solid rgba(135,206,235,0.1)}
    .users-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:#e2e8f0;vertical-align:middle}
    .users-table tr:hover td{background:rgba(135,206,235,0.03)}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
    .badge-green{background:rgba(52,211,153,0.15);color:#34d399}
    .badge-red{background:rgba(239,83,80,0.15);color:#ef5350}
    .badge-blue{background:rgba(79,195,247,0.15);color:#4fc3f7}
    .badge-gray{background:rgba(255,255,255,0.06);color:#4a5568}
    .adm-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit;transition:all .2s}
    .adm-btn-blue{background:rgba(79,195,247,0.1);border-color:rgba(79,195,247,0.3);color:#4fc3f7}
    .adm-btn-blue:hover{background:rgba(79,195,247,0.2)}
    .adm-btn-red{background:rgba(239,83,80,0.1);border-color:rgba(239,83,80,0.3);color:#ef5350}
    .adm-btn-red:hover{background:rgba(239,83,80,0.2)}
    .adm-btn-green{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:#34d399}
    .adm-btn-green:hover{background:rgba(52,211,153,0.2)}
    .adm-actions{display:flex;gap:6px;flex-wrap:wrap}
    .modal-inner{display:flex;flex-direction:column;gap:12px}
    .modal-inner label{font-size:12px;color:#4a5568;margin-bottom:2px;display:block}
    .modal-inner select{background:rgba(135,206,235,0.05);border:1px solid rgba(135,206,235,0.15);border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none;width:100%}
    .adm-msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px;display:none}
    .adm-msg.ok{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34d399}
    .adm-msg.err{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);color:#ef5350}
    @media(max-width:768px){.adm-stats{grid-template-columns:1fr 1fr}.users-table{font-size:11px}}
  </style>
</head>
<body>
<canvas id="spaceCanvas"></canvas>
<div class="page-transition" id="pageTransition"></div>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="16" height="16" viewBox="0 0 18 18"><path d="M9 1L11.5 6.5H17L12.5 10L14.5 16L9 12.5L3.5 16L5.5 10L1 6.5H6.5L9 1Z" fill="#87CEEB"/></svg>
      TheDay Admin
    </a>
    <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
      <span id="navAdminBadge" style="display:none;font-size:11px;color:#34d399;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);padding:3px 10px;border-radius:20px">● Авторизован</span>
      <button onclick="adminLogout()" id="logoutBtn" style="display:none" class="btn-ghost" style="padding:6px 14px;font-size:12px">Выйти</button>
    </div>
  </div>
</nav>

<div class="adm">

  <!-- LOGIN -->
  <div id="adminLogin" class="adm-login">
    <div class="glass-card auth-card">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 18 18"><path d="M9 1L11.5 6.5H17L12.5 10L14.5 16L9 12.5L3.5 16L5.5 10L1 6.5H6.5L9 1Z" fill="#87CEEB"/></svg>
      </div>
      <h2>Админ-панель<br/><span class="accent">TheDay</span></h2>
      <p class="auth-sub">Введите секретный код доступа</p>
      <div class="auth-form">
        <div class="form-group">
          <label>Секретный код</label>
          <div class="input-wrap">
            <input type="password" id="adminSecretInput" class="glass-input" placeholder="••••••••••••"/>
            <button class="eye-btn" onclick="togglePass('adminSecretInput',this)">👁</button>
          </div>
        </div>
        <div class="auth-error" id="adminLoginErr"></div>
        <button class="btn-auth" onclick="adminLogin()">Войти в панель</button>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="adminPanel" style="display:none" class="adm-main">

    <div class="adm-header">
      <h1>⚙ Управление пользователями</h1>
      <button class="btn-primary" onclick="loadUsers()" style="font-size:13px;padding:8px 16px">↻ Обновить</button>
    </div>

    <!-- Статистика -->
    <div class="adm-stats" id="adminStats">
      <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-label">Всего</div></div>
      <div class="stat-card"><div class="stat-num" id="sActive" style="color:#34d399">—</div><div class="stat-label">С подпиской</div></div>
      <div class="stat-card"><div class="stat-num" id="sBanned" style="color:#ef5350">—</div><div class="stat-label">Заблокировано</div></div>
      <div class="stat-card"><div class="stat-num" id="sNoSub" style="color:#ffa726">—</div><div class="stat-label">Без подписки</div></div>
    </div>

    <!-- Поиск -->
    <div class="adm-search">
      <input class="glass-input" id="searchInput" placeholder="Поиск по логину, email или ID..." oninput="filterUsers(this.value)" style="max-width:400px"/>
      <button class="btn-ghost" onclick="filterUsers('')" style="font-size:13px;padding:8px 14px">Сбросить</button>
    </div>

    <!-- Таблица -->
    <div class="glass-card" style="overflow:auto">
      <table class="users-table">
        <thead>
          <tr>
            <th>Пользователь</th>
            <th>Email</th>
            <th>Роль</th>
            <th>Подписка</th>
            <th>HWID</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7" style="text-align:center;color:#4a5568;padding:32px">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="glass-card modal-box" onclick="event.stopPropagation()" style="max-width:440px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="api.js"></script><script src="auth.js"></script>
<script src="smooth.js"></script>
<script src="theme.js"></script>
<script src="main.js"></script>
<script>
const API_BASE = window.location.origin + '/api';
let adminSecret = '';
let allUsers = [];

function togglePass(id,btn){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
  btn.textContent=i.type==='password'?'👁':'🙈';
}

async function adminLogin(){
  const s=document.getElementById('adminSecretInput').value.trim();
  const err=document.getElementById('adminLoginErr');
  if(!s){err.textContent='Введите код';err.style.display='block';return;}
  try {
    const r=await fetch(`${API_BASE}/admin/auth`,{method:'POST',headers:{'Content-Type':'application/json','x-admin-secret':s},body:JSON.stringify({})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error);
    adminSecret=s;
    sessionStorage.setItem('adminSecret',s);
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    document.getElementById('navAdminBadge').style.display='inline';
    document.getElementById('logoutBtn').style.display='inline-flex';
    loadStats(); loadUsers();
  } catch(e){err.textContent=e.message;err.style.display='block';}
}

function adminLogout(){
  adminSecret=''; sessionStorage.removeItem('adminSecret');
  document.getElementById('adminLogin').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('navAdminBadge').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
}

async function apiFetch(path,method='GET',body){
  const r=await fetch(`${API_BASE}${path}`,{
    method,
    headers:{'Content-Type':'application/json','x-admin-secret':adminSecret},
    body:body?JSON.stringify(body):undefined
  });
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Ошибка');
  return d;
}

async function loadStats(){
  try{
    const d=await apiFetch('/admin/stats');
    document.getElementById('sTotal').textContent=d.total;
    document.getElementById('sActive').textContent=d.active;
    document.getElementById('sBanned').textContent=d.banned;
    document.getElementById('sNoSub').textContent=d.noSub;
  }catch(e){console.error(e);}
}

async function loadUsers(){
  try{
    const d=await apiFetch('/admin/users');
    allUsers=d.users;
    renderUsers(allUsers);
    loadStats();
  }catch(e){
    document.getElementById('usersBody').innerHTML=`<tr><td colspan="7" style="text-align:center;color:#ef5350;padding:24px">${e.message}</td></tr>`;
  }
}

function filterUsers(q){
  if(!q){renderUsers(allUsers);return;}
  const f=allUsers.filter(u=>
    u.username?.toLowerCase().includes(q.toLowerCase())||
    u.email?.toLowerCase().includes(q.toLowerCase())||
    u.id?.toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(f);
}

function renderUsers(users){
  const tbody=document.getElementById('usersBody');
  if(!users.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#4a5568;padding:24px">Нет пользователей</td></tr>';return;}
  tbody.innerHTML=users.map(u=>`
    <tr>
      <td>
        <div style="font-weight:600;color:#fff">${u.username||'—'}</div>
        <div style="font-size:10px;color:#4a5568;font-family:monospace">${u.id}</div>
      </td>
      <td style="color:#87CEEB">${u.email||'—'}</td>
      <td><span class="badge ${u.role==='Администратор'?'badge-blue':'badge-gray'}">${u.role||'—'}</span></td>
      <td>
        ${u.sub?`<span class="badge badge-green">${u.sub}</span>${u.subExpires&&u.sub!=='Навсегда'?`<div style="font-size:10px;color:#4a5568;margin-top:2px">до ${new Date(u.subExpires).toLocaleDateString('ru-RU')}</div>`:''}`:
        '<span class="badge badge-gray">Нет</span>'}
      </td>
      <td style="font-family:monospace;font-size:10px;color:#4a5568">${u.hwid?u.hwid.slice(0,16)+'...':'—'}</td>
      <td><span class="badge ${u.banned?'badge-red':'badge-green'}">${u.banned?'Заблокирован':'Активен'}</span></td>
      <td>
        <div class="adm-actions">
          <button class="adm-btn adm-btn-blue" onclick="showSubModal('${u.id}','${u.username}')">📦 Подписка</button>
          <button class="adm-btn ${u.banned?'adm-btn-green':'adm-btn-red'}" onclick="${u.banned?`unbanUser('${u.id}')`:`banUser('${u.id}')`}">${u.banned?'✓ Разбан':'✗ Бан'}</button>
          <button class="adm-btn adm-btn-blue" onclick="resetHwidAdmin('${u.id}','${u.username}')">↺ HWID</button>
          <button class="adm-btn adm-btn-red" onclick="deleteUserAdmin('${u.id}','${u.username}')">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function showSubModal(id,username){
  document.getElementById('modalContent').innerHTML=`
    <h3 style="color:#fff;margin-bottom:16px">📦 Подписка — ${username}</h3>
    <div class="modal-inner">
      <div>
        <label>Тип подписки</label>
        <select id="subType">
          <option value="7 дней">7 дней</option>
          <option value="30 дней" selected>30 дней</option>
          <option value="90 дней">90 дней</option>
          <option value="Навсегда">Навсегда</option>
        </select>
      </div>
      <div>
        <label>Дней (для кастомного срока)</label>
        <input class="glass-input" id="subDays" type="number" placeholder="30" value="30" style="width:100%"/>
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="giveSubAdmin('${id}')">Выдать подписку</button>
      <button class="adm-btn adm-btn-red" style="width:100%;justify-content:center" onclick="removeSubAdmin('${id}')">Убрать подписку</button>
      <div class="adm-msg" id="subMsg"></div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

async function giveSubAdmin(id){
  const sub=document.getElementById('subType').value;
  const days=parseInt(document.getElementById('subDays').value)||30;
  const msg=document.getElementById('subMsg');
  try{
    await apiFetch(`/admin/user/${id}/subscription`,'POST',{sub,days});
    msg.className='adm-msg ok'; msg.textContent='✓ Подписка выдана'; msg.style.display='block';
    setTimeout(()=>{closeModal();loadUsers();},1200);
  }catch(e){msg.className='adm-msg err';msg.textContent=e.message;msg.style.display='block';}
}

async function removeSubAdmin(id){
  const msg=document.getElementById('subMsg');
  try{
    await apiFetch(`/admin/user/${id}/subscription`,'POST',{sub:null,days:0});
    msg.className='adm-msg ok'; msg.textContent='✓ Подписка убрана'; msg.style.display='block';
    setTimeout(()=>{closeModal();loadUsers();},1200);
  }catch(e){msg.className='adm-msg err';msg.textContent=e.message;msg.style.display='block';}
}

async function banUser(id){
  const reason=prompt('Причина блокировки (необязательно):','');
  if(reason===null) return;
  try{ await apiFetch(`/admin/user/${id}/ban`,'POST',{banned:true,reason}); loadUsers(); }
  catch(e){ alert(e.message); }
}
async function unbanUser(id){
  try{ await apiFetch(`/admin/user/${id}/ban`,'POST',{banned:false,reason:''}); loadUsers(); }
  catch(e){ alert(e.message); }
}
async function resetHwidAdmin(id,username){
  if(!confirm(`Сбросить HWID для ${username}?`)) return;
  try{ await apiFetch(`/admin/user/${id}/reset-hwid`,'POST',{}); alert('HWID сброшен'); loadUsers(); }
  catch(e){ alert(e.message); }
}
async function deleteUserAdmin(id,username){
  if(!confirm(`Удалить пользователя ${username}? Это действие необратимо!`)) return;
  try{ await apiFetch(`/admin/user/${id}`,'DELETE'); loadUsers(); }
  catch(e){ alert(e.message); }
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('active'); }

// Автовход если сессия сохранена
const saved=sessionStorage.getItem('adminSecret');
if(saved){ document.getElementById('adminSecretInput').value=saved; adminLogin(); }

document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('adminLogin').style.display!=='none') adminLogin(); });
</script>
</body>
</html>
