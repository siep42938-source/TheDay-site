<!DOCTYPE html>
<html lang="ru" data-theme="space">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация — TheDay Client</title>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://the-day-site-ovk7.vercel.app; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body class="auth-page">
<canvas id="spaceCanvas"></canvas>
<div class="page-transition" id="pageTransition"></div>

<div class="auth-wrap">
  <div class="glass-card auth-card">

    <!-- ШАГ 1: Данные -->
    <div id="step1">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 18 18"><path d="M9 1L11.5 6.5H17L12.5 10L14.5 16L9 12.5L3.5 16L5.5 10L1 6.5H6.5L9 1Z" fill="#87CEEB"/></svg>
      </div>
      <h2>Создать аккаунт<br/><span class="accent">TheDay</span></h2>
      <p class="auth-sub">Присоединяйтесь к тысячам игроков</p>
      <div class="auth-form">
        <div class="form-group">
          <label>Логин</label>
          <input type="text" id="regUser" class="glass-input" placeholder="username" autocomplete="username"/>
          <div class="field-hint">Только латиница, цифры и _ (3–20 символов)</div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" class="glass-input" placeholder="email@example.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <div class="input-wrap">
            <input type="password" id="regPass" class="glass-input" placeholder="Минимум 6 символов" autocomplete="new-password"/>
            <button class="eye-btn" type="button" onclick="togglePass('regPass',this)">👁</button>
          </div>
          <div class="password-strength" id="passStrength" style="display:none">
            <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
            <span class="ps-label" id="psLabel"></span>
          </div>
        </div>
        <div class="auth-error" id="regErr"></div>
        <button class="btn-auth" id="regBtn" onclick="sendRegCode()">
          <span id="regBtnText">Создать аккаунт</span>
          <span class="btn-spinner" id="regSpinner" style="display:none">⟳</span>
        </button>
        <p class="auth-switch">Уже есть аккаунт? <a href="login.html" class="form-link">Войти</a></p>
        <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">
          Регистрируясь, вы соглашаетесь с <a href="docs.html" class="form-link">условиями использования</a>
        </p>
      </div>
    </div>

    <!-- ШАГ 2: OTP -->
    <div id="step2" style="display:none">
      <div class="auth-logo"><div style="font-size:32px">✉️</div></div>
      <h2>Подтвердите<br/><span class="accent">email</span></h2>
      <p class="auth-sub" id="otpSubtext">Введите код из письма</p>
      <div class="auth-form">
        <div class="otp-inputs" id="otpInputs">
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        </div>
        <div class="auth-error" id="otpErr"></div>
        <button class="btn-auth" id="otpBtn" onclick="verifyRegCode()">
          <span id="otpBtnText">Подтвердить</span>
          <span class="btn-spinner" id="otpSpinner" style="display:none">⟳</span>
        </button>
        <div class="otp-resend">
          Не получили? <button class="form-link" id="resendBtn" onclick="resendCode()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit">Отправить снова</button>
          <span id="resendTimer" style="display:none;color:var(--muted)">через <span id="timerSec">60</span>с</span>
        </div>
        <button class="btn-back" onclick="backToStep1()">← Назад</button>
      </div>
    </div>

  </div>
</div>

<script src="api.js"></script><script src="auth.js"></script><script src="smooth.js"></script><script src="theme.js"></script><script src="main.js"></script>
<script>
if (localStorage.getItem('td_token')) window.location.href = 'account.html';

const SERVER = 'https://the-day-site-ovk7.vercel.app/api';
let regEmail = '';

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}
function setLoading(btnId, spinnerId, textId, loading, text) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinnerId).style.display = loading ? 'inline' : 'none';
  if (text) document.getElementById(textId).textContent = text;
}

// Индикатор силы пароля
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('regPass')?.addEventListener('input', function() {
    const v = this.value;
    const el = document.getElementById('passStrength');
    const fill = document.getElementById('psFill');
    const label = document.getElementById('psLabel');
    if (!v) { el.style.display = 'none'; return; }
    el.style.display = 'flex';
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const levels = [
      { pct:'20%', color:'#ef5350', text:'Очень слабый' },
      { pct:'40%', color:'#ff7043', text:'Слабый' },
      { pct:'60%', color:'#ffa726', text:'Средний' },
      { pct:'80%', color:'#66bb6a', text:'Хороший' },
      { pct:'100%', color:'#26c6da', text:'Отличный' },
    ];
    const l = levels[Math.min(score-1, 4)] || levels[0];
    fill.style.width = l.pct; fill.style.background = l.color;
    label.textContent = l.text; label.style.color = l.color;
  });
});

async function apiPost(path, body) {
  const r = await fetch(SERVER + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  // Проверяем что ответ содержит JSON
  const contentType = r.headers.get('content-type');
  if (!contentType || !contentType.includes('application/json')) {
    throw new Error('Сервер недоступен. Используется локальный режим.');
  }

  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Ошибка сервера');
  return d;
}

async function sendRegCode() {
  const username = document.getElementById('regUser').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  showErr('regErr', '');
  if (!username || !email || !password) return showErr('regErr', 'Заполните все поля');

  setLoading('regBtn','regSpinner','regBtnText', true, 'Отправка...');
  try {
    const data = await apiPost('/auth/register/send', { username, email, password });
    regEmail = email;
    document.getElementById('otpSubtext').textContent = `Код отправлен на ${email}`;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    initOTP('otpInputs');
    startResendTimer();
  } catch(e) {
    showErr('regErr', e.message);
  } finally {
    setLoading('regBtn','regSpinner','regBtnText', false, 'Создать аккаунт');
  }
}

async function verifyRegCode() {
  const code = getOTPValue('otpInputs');
  showErr('otpErr', '');
  if (code.length !== 6) return showErr('otpErr', 'Введите 6-значный код');

  setLoading('otpBtn','otpSpinner','otpBtnText', true, 'Создание...');
  try {
    const data = await apiPost('/auth/register/verify', { email: regEmail, code });
    localStorage.setItem('td_token', data.token);
    localStorage.setItem('td_user', JSON.stringify(data.user));
    window.location.href = 'account.html';
  } catch(e) {
    showErr('otpErr', e.message);
    shakeOTP('otpInputs');
  } finally {
    setLoading('otpBtn','otpSpinner','otpBtnText', false, 'Подтвердить');
  }
}

async function resendCode() {
  try {
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value;
    await apiPost('/auth/register/send', { username, email: regEmail, password });
    startResendTimer();
  } catch(e) { showErr('otpErr', e.message); }
}

function showDevCode(code, email) {
  document.getElementById('devToast')?.remove();
  const t = document.createElement('div');
  t.id = 'devToast';
  t.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(10,10,18,0.97);border:1px solid rgba(135,206,235,0.3);border-radius:14px;padding:20px 28px;text-align:center;backdrop-filter:blur(20px);font-family:Inter,sans-serif;min-width:280px;box-shadow:0 8px 40px rgba(0,0,0,0.6);animation:slideDown .4s cubic-bezier(.16,1,.3,1)';

  const label = document.createElement('div');
  label.style.cssText = 'font-size:10px;color:#4fc3f7;font-weight:700;letter-spacing:2px;margin-bottom:6px';
  label.textContent = '📧 КОД ПОДТВЕРЖДЕНИЯ';

  const emailEl = document.createElement('div');
  emailEl.style.cssText = 'font-size:11px;color:#4a5568;margin-bottom:10px';
  emailEl.textContent = email;

  const codeEl = document.createElement('div');
  codeEl.style.cssText = 'font-size:42px;font-weight:900;letter-spacing:10px;color:#87CEEB;font-family:monospace;margin-bottom:6px';
  codeEl.textContent = code;

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:#4a5568';
  hint.textContent = 'Действителен 10 минут';

  const closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'position:absolute;top:10px;right:12px;background:none;border:none;color:#4a5568;cursor:pointer;font-size:16px';
  closeBtn.textContent = '✕';
  closeBtn.onclick = () => t.remove();

  t.append(label, emailEl, codeEl, hint, closeBtn);

  if (!document.getElementById('slideDownStyle')) {
    const s = document.createElement('style');
    s.id = 'slideDownStyle';
    s.textContent = '@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 5*60000);
}

function backToStep1() {
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
}

function initOTP(containerId) {
  const inputs = document.querySelectorAll(`#${containerId} .otp-digit`);
  inputs.forEach((inp, i) => {
    inp.value = '';
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g,'').slice(-1);
      if (inp.value && i < inputs.length-1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
      inputs.forEach((inp2,j) => { inp2.value = text[j]||''; });
      inputs[Math.min(text.length, inputs.length-1)].focus();
    });
  });
  inputs[0].focus();
}
function getOTPValue(id) {
  return [...document.querySelectorAll(`#${id} .otp-digit`)].map(i=>i.value).join('');
}
function shakeOTP(id) {
  const el = document.getElementById(id);
  el.style.animation = 'shake .4s ease';
  setTimeout(() => el.style.animation = '', 400);
}

let resendInterval;
function startResendTimer() {
  clearInterval(resendInterval);
  let sec = 60;
  document.getElementById('resendBtn').style.display = 'none';
  document.getElementById('resendTimer').style.display = 'inline';
  document.getElementById('timerSec').textContent = sec;
  resendInterval = setInterval(() => {
    sec--;
    document.getElementById('timerSec').textContent = sec;
    if (sec <= 0) {
      clearInterval(resendInterval);
      document.getElementById('resendBtn').style.display = 'inline';
      document.getElementById('resendTimer').style.display = 'none';
    }
  }, 1000);
}

function togglePass(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('step2').style.display !== 'none') verifyRegCode();
    else sendRegCode();
  }
});
</script>
</body>
</html>
