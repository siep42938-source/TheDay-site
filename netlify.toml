# =============================================================
# Netlify — конфигурация деплоя и заголовков безопасности
# Документация: https://docs.netlify.com/configure-builds/file-based-configuration/
# =============================================================

[build]
  # Папка с готовым сайтом (если используешь сборщик — укажи dist/ или build/)
  publish = "."

# Принудительный HTTPS-редирект
[[redirects]]
  from   = "http://*"
  to     = "https://:splat"
  status = 301
  force  = true

# Заголовки безопасности для всех страниц
[[headers]]
  for = "/*"

  [headers.values]
    # Запрет кликджекинга
    X-Frame-Options = "DENY"

    # Запрет MIME-сниффинга
    X-Content-Type-Options = "nosniff"

    # Политика реферера
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HSTS — 1 год, включая поддомены
    # ВНИМАНИЕ: включай только когда HTTPS точно работает!
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Запрет доступа к API браузера
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"

    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"

    # Cross-Origin изоляция
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Правила для JAR файлов — правильный MIME-тип и скачивание
[[headers]]
  for = "/*.jar"

  [headers.values]
    Content-Type = "application/java-archive"
    Content-Disposition = "attachment"
    Cross-Origin-Resource-Policy = "cross-origin"
