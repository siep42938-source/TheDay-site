<!DOCTYPE html>
<html lang="ru" data-theme="space">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Войти — TheDay Client</title>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://the-day-site-ovk7.vercel.app; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body class="auth-page">
<canvas id="spaceCanvas"></canvas>
<div class="page-transition" id="pageTransition"></div>

<div class="auth-wrap">
  <div class="glass-card auth-card">

    <!-- ШАГ 1: Email + пароль -->
    <div id="step1">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 18 18"><path d="M9 1L11.5 6.5H17L12.5 10L14.5 16L9 12.5L3.5 16L5.5 10L1 6.5H6.5L9 1Z" fill="#87CEEB"/></svg>
      </div>
      <h2>С возвращением в<br/><span class="accent">TheDay</span></h2>
      <p class="auth-sub">Войдите в свой аккаунт</p>
      <div class="auth-form">
        <div class="form-group">
          <label>Email или никнейм</label>
          <input type="text" id="loginEmail" class="glass-input" placeholder="email@example.com или Nickname" autocomplete="username"/>
        </div>
        <div class="form-group">
          <div class="form-label-row">
            <label>Пароль</label>
            <a href="#" class="form-link" onclick="showReset()">Забыли пароль?</a>
          </div>
          <div class="input-wrap">
            <input type="password" id="loginPass" class="glass-input" placeholder="••••••••" autocomplete="current-password"/>
            <button class="eye-btn" type="button" onclick="togglePass('loginPass',this)">👁</button>
          </div>
        </div>
        <div class="auth-error" id="loginErr"></div>
        <button class="btn-auth" id="loginBtn" onclick="sendLoginCode()">
          <span id="loginBtnText">Продолжить</span>
          <span class="btn-spinner" id="loginSpinner" style="display:none">⟳</span>
        </button>
        <p class="auth-switch">Нет аккаунта? <a href="register.html" class="form-link">Регистрация</a></p>
      </div>
    </div>

    <!-- ШАГ 2: OTP код -->
    <div id="step2" style="display:none">
      <div class="auth-logo">
        <div style="font-size:32px">📧</div>
      </div>
      <h2>Проверьте<br/><span class="accent">почту</span></h2>
      <p class="auth-sub" id="otpSubtext">Мы отправили 6-значный код на ваш email</p>
      <div class="auth-form">
        <div class="otp-inputs" id="otpInputs">
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        </div>
        <div class="auth-error" id="otpErr"></div>
        <button class="btn-auth" id="otpBtn" onclick="verifyLoginCode()">
          <span id="otpBtnText">Подтвердить</span>
          <span class="btn-spinner" id="otpSpinner" style="display:none">⟳</span>
        </button>
        <div class="otp-resend">
          Не получили? <button class="form-link" id="resendBtn" onclick="resendCode()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit">Отправить снова</button>
          <span id="resendTimer" style="display:none;color:var(--muted)">через <span id="timerSec">60</span>с</span>
        </div>
        <button class="btn-back" onclick="backToStep1()">← Назад</button>
      </div>
    </div>

    <!-- ШАГ: Сброс пароля -->
    <div id="stepReset" style="display:none">
      <div class="auth-logo"><div style="font-size:32px">🔒</div></div>
      <h2>Сброс<br/><span class="accent">пароля</span></h2>
      <p class="auth-sub">Введите email — отправим код для сброса</p>
      <div class="auth-form">
        <div id="resetStep1">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="resetEmail" class="glass-input" placeholder="email@example.com"/>
          </div>
          <div class="auth-error" id="resetErr1"></div>
          <button class="btn-auth" onclick="sendResetCode()">Отправить код</button>
        </div>
        <div id="resetStep2" style="display:none">
          <div class="otp-inputs" id="resetOtpInputs">
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
          </div>
          <div class="form-group" style="margin-top:16px">
            <label>Новый пароль</label>
            <input type="password" id="newPass" class="glass-input" placeholder="Минимум 6 символов"/>
          </div>
          <div class="auth-error" id="resetErr2"></div>
          <button class="btn-auth" onclick="confirmReset()">Сменить пароль</button>
        </div>
        <button class="btn-back" onclick="backToStep1()">← Назад</button>
      </div>
    </div>

  </div>
</div>

<script src="api.js"></script><script src="auth.js"></script><script src="smooth.js"></script><script src="theme.js"></script><script src="main.js"></script>
<script>
// Редирект если уже залогинен
if (localStorage.getItem('td_token')) window.location.href = 'account.html';

let loginEmail = '';

function setLoading(btnId, spinnerId, textId, loading, text) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinnerId).style.display = loading ? 'inline' : 'none';
  if (text) document.getElementById(textId).textContent = text;
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

const SERVER = 'https://the-day-site-ovk7.vercel.app/api';

async function apiPost(path, body) {
  return API.post(path, body);
}

function showDevCode(code, email) {
  document.getElementById('devToast')?.remove();
  const t = document.createElement('div');
  t.id = 'devToast';
  t.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(10,10,18,0.97);border:1px solid rgba(135,206,235,0.3);border-radius:14px;padding:20px 28px;text-align:center;backdrop-filter:blur(20px);font-family:Inter,sans-serif;min-width:280px;box-shadow:0 8px 40px rgba(0,0,0,0.6)';

  const label = document.createElement('div');
  label.style.cssText = 'font-size:10px;color:#4fc3f7;font-weight:700;letter-spacing:2px;margin-bottom:6px';
  label.textContent = '📧 КОД ПОДТВЕРЖДЕНИЯ';

  const emailEl = document.createElement('div');
  emailEl.style.cssText = 'font-size:11px;color:#4a5568;margin-bottom:10px';
  emailEl.textContent = email;

  const codeEl = document.createElement('div');
  codeEl.style.cssText = 'font-size:42px;font-weight:900;letter-spacing:10px;color:#87CEEB;font-family:monospace;margin-bottom:6px';
  codeEl.textContent = code;

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:#4a5568';
  hint.textContent = 'Действителен 10 минут';

  const closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'position:absolute;top:10px;right:12px;background:none;border:none;color:#4a5568;cursor:pointer;font-size:16px';
  closeBtn.textContent = '✕';
  closeBtn.onclick = () => t.remove();

  t.append(label, emailEl, codeEl, hint, closeBtn);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 5*60000);
}

async function sendLoginCode() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  showErr('loginErr', '');
  if (!email || !pass) return showErr('loginErr', 'Заполните все поля');

  setLoading('loginBtn','loginSpinner','loginBtnText', true, 'Отправка...');
  try {
    const data = await Auth.loginSend({ email, password: pass });
    loginEmail = data.email || email;
    document.getElementById('otpSubtext').textContent = `Код отправлен на ${loginEmail.includes('@') ? loginEmail : 'вашу почту'}`;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    initOTP('otpInputs');
    startResendTimer();
  } catch(e) {
    showErr('loginErr', e.message);
  } finally {
    setLoading('loginBtn','loginSpinner','loginBtnText', false, 'Продолжить');
  }
}

async function verifyLoginCode() {
  const code = getOTPValue('otpInputs');
  showErr('otpErr', '');
  if (code.length !== 6) return showErr('otpErr', 'Введите 6-значный код');

  setLoading('otpBtn','otpSpinner','otpBtnText', true, 'Проверка...');
  try {
    const data = await Auth.loginVerify({ email: loginEmail, code });
    localStorage.setItem('td_token', data.token);
    localStorage.setItem('td_user', JSON.stringify(data.user));
    window.location.href = 'account.html';
  } catch(e) {
    showErr('otpErr', e.message);
    shakeOTP('otpInputs');
  } finally {
    setLoading('otpBtn','otpSpinner','otpBtnText', false, 'Подтвердить');
  }
}

async function resendCode() {
  try {
    const pass = document.getElementById('loginPass').value;
    const data = await Auth.loginSend({ email: loginEmail, password: pass });
    startResendTimer();
    showErr('otpErr', '');
  } catch(e) { showErr('otpErr', e.message); }
}

function backToStep1() {
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('stepReset').style.display = 'none';
}
function showReset() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('stepReset').style.display = 'block';
}

async function sendResetCode() {
  const email = document.getElementById('resetEmail').value.trim();
  showErr('resetErr1', '');
  if (!email) return showErr('resetErr1', 'Введите email');
  try {
    await Auth.resetSend({ email });
    document.getElementById('resetStep1').style.display = 'none';
    document.getElementById('resetStep2').style.display = 'block';
    initOTP('resetOtpInputs');
  } catch(e) { showErr('resetErr1', e.message); }
}

async function confirmReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const code = getOTPValue('resetOtpInputs');
  const newPassword = document.getElementById('newPass').value;
  showErr('resetErr2', '');
  if (code.length !== 6) return showErr('resetErr2', 'Введите код');
  if (!newPassword || newPassword.length < 6) return showErr('resetErr2', 'Пароль минимум 6 символов');
  try {
    await Auth.resetVerify({ email, code, newPassword });
    alert('Пароль успешно изменён!');
    backToStep1();
  } catch(e) { showErr('resetErr2', e.message); }
}

// OTP helpers
function initOTP(containerId) {
  const inputs = document.querySelectorAll(`#${containerId} .otp-digit`);
  inputs.forEach((inp, i) => {
    inp.value = '';
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g,'').slice(-1);
      if (inp.value && i < inputs.length - 1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
    });
    inp.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      inputs.forEach((inp2, j) => { inp2.value = text[j] || ''; });
      inputs[Math.min(text.length, inputs.length-1)].focus();
    });
  });
  inputs[0].focus();
}
function getOTPValue(containerId) {
  return [...document.querySelectorAll(`#${containerId} .otp-digit`)].map(i=>i.value).join('');
}
function shakeOTP(containerId) {
  const el = document.getElementById(containerId);
  el.style.animation = 'shake .4s ease';
  setTimeout(() => el.style.animation = '', 400);
}

let resendInterval;
function startResendTimer() {
  clearInterval(resendInterval);
  let sec = 60;
  document.getElementById('resendBtn').style.display = 'none';
  document.getElementById('resendTimer').style.display = 'inline';
  document.getElementById('timerSec').textContent = sec;
  resendInterval = setInterval(() => {
    sec--;
    document.getElementById('timerSec').textContent = sec;
    if (sec <= 0) {
      clearInterval(resendInterval);
      document.getElementById('resendBtn').style.display = 'inline';
      document.getElementById('resendTimer').style.display = 'none';
    }
  }, 1000);
}

function togglePass(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('step2').style.display !== 'none') verifyLoginCode();
    else if (document.getElementById('step1').style.display !== 'none') sendLoginCode();
  }
});
</script>
</body>
</html>
